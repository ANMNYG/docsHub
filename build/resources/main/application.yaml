spring:
  application:
    name: docs-hub

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # localhost:3306 부분과 docs_hub(데이터베이스 이름)을 환경에 맞게 수정하세요.
    url: jdbc:mysql://localhost:3306/docshub?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root          # MySQL 사용자 계정
    password: dksalsdud1! # MySQL 비밀번호

  # JPA를 사용하실 경우 필요한 기본 설정입니다. (MyBatis를 쓰신다면 생략 가능합니다)
  jpa:
    open-in-view: false
    hibernate:
      # 개발 단계에서는 update가 편하지만, 실제 운영/배포 시에는 반드시 validate나 none으로 변경해야 합니다.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: false